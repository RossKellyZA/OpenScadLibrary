<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSCAD Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>OpenSCAD Interface</h1>
    </header>

    <div class="container">
        <div class="projects-panel">
            <h2>Projects</h2>
            <div id="project-list" class="scrollable"></div>
        </div>
        
        <div class="properties-panel">
            <div class="panel-header">
                <h2>Parameters</h2>
            </div>
            <div id="parameters-form" class="scrollable"></div>
        </div>
        
        <div class="render-panel">
            <div class="render-controls">
                <button id="render-btn">Render</button>
                <button id="export-stl-btn">Export STL</button>
            </div>
            <div id="viewer"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 OpenSCAD Interface</p>
    </footer>

    <!-- Third-party libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/openscad-parser@0.0.0/dist/openscad-parser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jscad/modeling@2.11.0/dist/jscad-modeling.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jscad/stl-serializer@2.1.1/dist/index.min.js"></script>
    
    <!-- App scripts -->
    <script src="js/scad-parser.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
